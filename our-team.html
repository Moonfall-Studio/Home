<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Our Team - Moonfall Studio</title>
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <script src="https://unpkg.com/i18next@21.6.10/dist/umd/i18next.min.js"></script>
    <script src="https://unpkg.com/i18next-http-backend@1.3.1/i18nextHttpBackend.min.js"></script>
    <script
        src="https://unpkg.com/i18next-browser-languagedetector@6.1.3/i18nextBrowserLanguageDetector.min.js"></script>
</head>

<body>
    <header>
        <a href="index.html" class="header-logo">
            <img src="assets/images/logo.png" alt="Moonfall Studio Logo">
        </a>
        <nav>
            <ul>
                <li><a href="index.html" class="home-link" data-i18n="nav.home">Home</a></li>
                <li><a href="our-work.html" data-i18n="nav.work">Our Work</a></li>
                <li><a href="our-team.html" class="active" data-i18n="nav.team">Our Team</a></li>
                <li><a href="about.html" data-i18n="nav.about">About Us</a></li>
                <li><a href="contact.html" data-i18n="nav.contact">Get In Touch</a></li>
            </ul>
        </nav>
        <div class="language-switcher">
            <div class="lang-dropdown">
                <span class="lang-flag" id="current-flag">🇺🇸</span>
                <span id="current-lang">EN</span>
                <div class="lang-menu">
                    <div class="lang-option" onclick="changeLanguage('en')">
                        <span class="lang-flag">🇺🇸</span> English
                    </div>
                    <div class="lang-option" onclick="changeLanguage('fr')">
                        <span class="lang-flag">🇫🇷</span> Français
                    </div>
                </div>
            </div>
        </div>
    </header>

    <main>
        <section class="content-section" style="padding-top: 150px;">
            <div class="container">
                <h1 data-i18n="nav.team">Our Team</h1>

                <div
                    style="margin-top: 4rem; display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 3rem;">
                    <!-- Team Member Placeholder -->
                    <a href="team-member.html"
                        style="text-decoration: none; color: inherit; display: block; transition: transform 0.3s;">
                        <div style="text-align: center;">
                            <div
                                style="width: 150px; height: 150px; background: var(--color-bg-alt); border-radius: 50%; margin: 0 auto 1rem; border: 1px solid var(--color-text-muted);">
                            </div>
                            <h3>Jane Doe</h3>
                            <p style="font-size: 0.9rem; color: var(--color-text-muted);">Creative Director</p>
                        </div>
                    </a>

                    <!-- Team Member Placeholder -->
                    <a href="team-member.html"
                        style="text-decoration: none; color: inherit; display: block; transition: transform 0.3s;">
                        <div style="text-align: center;">
                            <div
                                style="width: 150px; height: 150px; background: var(--color-bg-alt); border-radius: 50%; margin: 0 auto 1rem; border: 1px solid var(--color-text-muted);">
                            </div>
                            <h3>John Smith</h3>
                            <p style="font-size: 0.9rem; color: var(--color-text-muted);">Lead Developer</p>
                        </div>
                    </a>

                    <!-- Team Member Placeholder -->
                    <a href="team-member.html"
                        style="text-decoration: none; color: inherit; display: block; transition: transform 0.3s;">
                        <div style="text-align: center;">
                            <div
                                style="width: 150px; height: 150px; background: var(--color-bg-alt); border-radius: 50%; margin: 0 auto 1rem; border: 1px solid var(--color-text-muted);">
                            </div>
                            <h3>Alex Ray</h3>
                            <p style="font-size: 0.9rem; color: var(--color-text-muted);">Art Director</p>
                        </div>
                    </a>
                </div>
            </div>
        </section>
    </main>

    <footer>
        <p>&copy; 2025 Moonfall Studio. <span data-i18n="footer.rights">All rights reserved.</span></p>
    </footer>

    <script src="script.js"></script>
</body>

</html>
