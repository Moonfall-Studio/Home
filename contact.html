<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Get In Touch - Moonfall Studio</title>
    <meta name="description" content="Contact Moonfall Studio. Send us a message.">

    <!-- Google Fonts: Quicksand -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@300;400;500;700&display=swap" rel="stylesheet">

    <!-- Styles -->
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <!-- Header (always scrolled on standalone pages) -->
    <header class="scrolled">
        <!-- Back Link (left) -->
        <a href="index.html" class="burger" id="back-link" aria-label="Back to home">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M19 12H5"></path>
                <path d="M12 19l-7-7 7-7"></path>
            </svg>
            <span class="burger__text" data-i18n="nav.back">Back</span>
        </a>

        <!-- Studio Name (center) -->
        <a href="index.html" class="header-title">Moonfall Studio</a>

        <!-- Language Toggle (right) -->
        <button class="lang-toggle" id="lang-toggle-btn">
            <span class="lang-toggle__option" data-lang="en" id="lang-en">English (US)</span>
            <span class="lang-toggle__sep">/</span>
            <span class="lang-toggle__option" data-lang="fr" id="lang-fr">Français (FR)</span>
        </button>
    </header>

    <main>
        <section class="content-section contact-standalone" id="contact-page">
            <div class="container">
                <h1 data-i18n="contact.title">Get In Touch</h1>
                <p data-i18n="contact.email">moonfallstudio.contact@gmail.com</p>

                <div class="contact-form-wrapper">
                    <h3 data-i18n="contact.form_title">Send us a message</h3>
                    <form class="contact-form" id="contact-form">
                        <input type="text" class="contact-input" id="contact-name" data-i18n-placeholder="contact.name_placeholder" placeholder="Name">
                        <input type="email" class="contact-input" id="contact-email" data-i18n-placeholder="contact.email_placeholder" placeholder="Email">
                        <textarea class="contact-input" id="contact-message" rows="5" data-i18n-placeholder="contact.message_placeholder" placeholder="Message"></textarea>
                        <button type="button" class="btn contact-submit" id="contact-send" data-i18n="contact.send">Send</button>
                    </form>
                </div>
            </div>
        </section>
    </main>

    <footer>
        <p>&copy; 2026 Moonfall Studio. <span data-i18n="footer.rights">All rights reserved.</span></p>
    </footer>

    <!-- Scripts -->
    <script src="script.js"></script>
</body>

</html>
