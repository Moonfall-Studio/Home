<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact - Moonfall Studio</title>
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <script src="https://unpkg.com/i18next@21.6.10/dist/umd/i18next.min.js"></script>
    <script src="https://unpkg.com/i18next-http-backend@1.3.1/i18nextHttpBackend.min.js"></script>
    <script
        src="https://unpkg.com/i18next-browser-languagedetector@6.1.3/i18nextBrowserLanguageDetector.min.js"></script>
</head>

<body>
    <header>
        <a href="index.html" class="header-logo">
            <img src="assets/images/logo.png" alt="Moonfall Studio Logo">
        </a>
        <nav>
            <ul>
                <li><a href="index.html" class="home-link" data-i18n="nav.home">Home</a></li>
                <li><a href="our-work.html" data-i18n="nav.work">Our Work</a></li>
                <li><a href="our-team.html" data-i18n="nav.team">Our Team</a></li>
                <li><a href="about.html" data-i18n="nav.about">About Us</a></li>
                <li><a href="contact.html" class="active" data-i18n="nav.contact">Get In Touch</a></li>
            </ul>
        </nav>
        <div class="language-switcher">
            <div class="lang-dropdown">
                <span class="lang-flag" id="current-flag">🇺🇸</span>
                <span id="current-lang">EN</span>
                <div class="lang-menu">
                    <div class="lang-option" onclick="changeLanguage('en')">
                        <span class="lang-flag">🇺🇸</span> English
                    </div>
                    <div class="lang-option" onclick="changeLanguage('fr')">
                        <span class="lang-flag">🇫🇷</span> Français
                    </div>
                </div>
            </div>
        </div>
    </header>

    <main>
        <section class="content-section" style="padding-top: 150px;">
            <div class="container">
                <h1 data-i18n="contact.title">Get In Touch</h1>
                <p data-i18n="contact.email">hello@moonfallstudio.com</p>

                <div
                    style="margin-top: 4rem; max-width: 600px; margin-left: auto; margin-right: auto; background: var(--color-bg-alt); padding: 2rem; border: 1px solid rgba(255,255,255,0.05);">
                    <h3 style="margin-bottom: 1rem;">Send us a message</h3>
                    <form style="display: flex; flex-direction: column; gap: 1rem;">
                        <input type="text" placeholder="Name"
                            style="padding: 1rem; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); color: var(--color-text);">
                        <input type="email" placeholder="Email"
                            style="padding: 1rem; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); color: var(--color-text);">
                        <textarea placeholder="Message" rows="5"
                            style="padding: 1rem; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); color: var(--color-text);"></textarea>
                        <button type="button" class="btn" style="width: 100%;">Send</button>
                    </form>
                </div>
            </div>
        </section>
    </main>

    <footer>
        <p>&copy; 2025 Moonfall Studio. <span data-i18n="footer.rights">All rights reserved.</span></p>
    </footer>

    <script src="script.js"></script>
</body>

</html>
